name: QA Basic Check

on:
  pull_request:
    branches: [main, master]

jobs:
  check-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter (Cek Kerapihan)
        run: npm run lint
        # Ini penting buat QA biar kode gak berantakan, tanpa butuh DB.

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit
        # Ini super penting! Memastikan logika kodenya nyambung.